name: SoundFlow

options:
  bundleIdPrefix: com.soundflow
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: XXXXXXXXXX

targets:
  SoundFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoundFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundflow.app
        INFOPLIST_FILE: SoundFlow/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - sdk: SwiftData.framework
      - sdk: AVFoundation.framework
      - sdk: StoreKit.framework
      - sdk: HealthKit.framework
    entitlements:
      path: SoundFlow/SoundFlow.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    info:
      path: SoundFlow/Info.plist
      properties:
        CFBundleDisplayName: SoundFlow
        UILaunchScreen:
          UIColorName: ""
        NSHealthShareUsageDescription: "SoundFlow uses HealthKit to track your sleep sessions."
        NSHealthUpdateUsageDescription: "SoundFlow writes sleep data to HealthKit."
        UIBackgroundModes:
          - audio

  SoundFlowWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: SoundFlowWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundflow.watchapp
        INFOPLIST_FILE: SoundFlowWatch/Info.plist
    dependencies:
      - sdk: WatchKit.framework
    info:
      path: SoundFlowWatch/Info.plist
      properties:
        CFBundleDisplayName: SoundFlow
        WKApplication: true

  SoundFlowWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoundFlowWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundflow.app.widget
        INFOPLIST_FILE: SoundFlowWidgetExtension/Info.plist
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: SoundFlowWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: SoundFlowWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
